<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Literacy App</title>
    <script defer src="index.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Finance Literacy Teacher</h1>
    </header>    
    <main>
        <section id="compound-interest">
            <h2>Compound Interest</h2>
            <form id="input-form">
                <label for="starting-principal">Starting Principal</label>
                <input type="number" id="starting-principal">
                <label for="annual-rate">Annual Rate</label>
                <input type="number" id="annual-rate">
                <label for="number-of-years">Number of Years</label>
                <input type="number" id="number-of-years">
                <button type="submit">Submit</button>
            </form>
        </section>
        <section id="rule-of-72">
            <h2>Rule of 72</h2>
        </section>
        <section id="budget-categorizer">
            <h2>Budget Categorizer</h2> 
        </section>
        <section id="inflation-calculator">
            <h2>Inflation Calculator</h2>
        </section>
    </main>
    <footer></footer>
</body>
</html>
